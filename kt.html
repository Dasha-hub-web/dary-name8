<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="kt.css">
</head>

<body>
    <div class="product-card">
        <!-- Зелёный фон-эллипс отдельным элементом -->
        <div class="product-bg-1"></div>

        <div class="product-bg-2"></div>

        <!-- Контент карточки -->
        <div class="product-content">
            <div class="product-image">
                <img src="flower1.jpg?  w=400&h=500&fit=crop" alt="Букет цветов">
            </div>

            <div class="product-info">
                <div class="product-header">
                    <div class="product-text">
                        <h3 class="product-name">Название</h3>
                        <p class="product-desc">описание</p>
                    </div>
                    <span class="product-price">$250</span>
                </div>

                <button class="product-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                    <span>кнопка</span>
                </button>
            </div>
        </div>
    </div>
</body>

</html>
